apiVersion: kalypso.io/v1alpha1
kind: ClusterWorkload
metadata:
  name: tenant-a
spec:
  # namespace omitted -> defaults to the instance name ("tenant-a").
  # The whole workload object is forwarded verbatim to the inner Workload.
  workload:
    compute:
      image: registry.k8s.io/pause:3.9
    networking:
      expose: true
