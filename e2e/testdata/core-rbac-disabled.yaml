apiVersion: kalypso.lmoet.io/v1alpha2
kind: Core
metadata:
  name: core-rbac-disabled
spec:
  image: gcr.io/google-samples/hello-app:1.0
  serviceAccount:
    create: true
  rbac:
    enabled: false
    rules:
      - apiGroups: [""]
        resources: ["configmaps"]
        verbs: ["get", "list", "watch"]
    clusterRules:
      - apiGroups: [""]
        resources: ["nodes"]
        verbs: ["get", "list"]
