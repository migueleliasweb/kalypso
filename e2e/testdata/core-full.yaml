apiVersion: kalypso.lmoet.io/v1alpha2
kind: Core
metadata:
  name: core-full
spec:
  workloadType: Deployment
  image: gcr.io/google-samples/hello-app:1.0
  port: 8080
  replicas: 2
  resources:
    requests:
      cpu: "200m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 80
  pdb:
    enabled: true
    maxUnavailable: "50%"
  configMap:
    enabled: true
    data:
      CM_KEY_1: "cm_val_1"
  secret:
    enabled: true
    data:
      SEC_KEY_1: "sec_val_1"
  serviceAccount:
    create: true
