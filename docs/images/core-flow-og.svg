<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 860" width="100%" height="100%">
  <!-- Styles for elements -->
  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 24px; font-weight: 800; fill: #F8FAFC; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #F1F5F9; }
    .desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .cond-text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 10px; fill: #F43F5E; font-weight: bold; }
    .box-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #F8FAFC; }
    .box-desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .resource-text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 12px; fill: #E2E8F0; }
    .arrow-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #38BDF8; font-weight: 600; }
    
    /* Hover effects and transitions */
    .node-card { transition: transform 0.2s ease, filter 0.2s ease; }
    .node-card:hover { transform: translate(-2px, -2px); filter: brightness(1.1); }
  </style>

  <!-- Background -->
  <rect width="940" height="860" rx="16" fill="#0B0F19" />

  <!-- Gradients -->
  <defs>
    <!-- Soft Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-indigo" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366F1" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-teal" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#0D9488" flood-opacity="0.4"/>
    </filter>

    <!-- Card Gradients -->
    <linearGradient id="grad-input" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    <linearGradient id="grad-internal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="grad-workload" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488" />
      <stop offset="100%" stop-color="#115E59" />
    </linearGradient>
    <linearGradient id="grad-subresource" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="grad-operational" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#5B21B6" />
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#38BDF8" />
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#0D9488" />
    </marker>
  </defs>

  <!-- Title & Header -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">Kalypso Core RGD Flow Graph</text>
    <text class="subtitle" x="0" y="24">Resource instantiation tree and conditional graph dependencies in v1alpha2</text>
  </g>

  <!-- Legend -->
  <g transform="translate(680, 20)">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    <text class="label" x="15" y="22" font-size="11">Legend</text>
    <circle cx="20" cy="45" r="6" fill="#4F46E5" />
    <text class="desc" x="35" y="49">Input Custom Resource</text>
    <circle cx="20" cy="65" r="6" fill="#1E293B" stroke="#475569" stroke-width="1.5" />
    <text class="desc" x="35" y="69">Internal / Chained RGD</text>
    <circle cx="20" cy="85" r="6" fill="#0D9488" />
    <text class="desc" x="35" y="89">Core Workloads (Exclusive)</text>
    <circle cx="20" cy="105" r="6" fill="#7C3AED" />
    <text class="desc" x="35" y="109">Operational/Support Resources</text>
  </g>

  <!-- Connector Lines Section -->
  <g>
    <!-- Connect: Core CR -> PodSpec Chained RGD (Widened space) -->
    <path d="M 210,220 L 300,220" fill="none" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text class="arrow-text" x="255" y="210" text-anchor="middle">Chains to</text>

    <!-- Connect: PodTemplate -> Workloads (Central Hub Line) -->
    <path d="M 525,347 L 550,347 L 550,270 L 580,270" fill="none" stroke="#0D9488" stroke-width="2" marker-end="url(#arrow-teal)" />
    <path d="M 550,270 L 550,190 L 580,190" fill="none" stroke="#0D9488" stroke-width="2" marker-end="url(#arrow-teal)" />
    <path d="M 550,347 L 580,350" fill="none" stroke="#0D9488" stroke-width="2" marker-end="url(#arrow-teal)" />
    <text class="arrow-text" x="550" y="150" text-anchor="middle">Injects PodSpec</text>

    <!-- Connect: Core CR -> Workloads Selection Direct Paths (shows dependency + exclusivity) -->
    <path d="M 115,270 L 115,455 L 580,455" fill="none" stroke="#475569" stroke-dasharray="4,4" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 115,455 L 115,520 L 580,520" fill="none" stroke="#475569" stroke-dasharray="4,4" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 115,520 L 115,585 L 580,585" fill="none" stroke="#475569" stroke-dasharray="4,4" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 115,585 L 115,650 L 580,650" fill="none" stroke="#475569" stroke-dasharray="4,4" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 115,650 L 115,715 L 580,715" fill="none" stroke="#475569" stroke-dasharray="4,4" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 115,270 L 115,415 L 580,415" fill="none" stroke="#475569" stroke-dasharray="4,4" stroke-width="1.5" marker-end="url(#arrow)" />
  </g>

  <!-- 1. INPUT LAYER: Core CR -->
  <g class="node-card" filter="url(#shadow)" transform="translate(20, 170)">
    <rect width="190" height="100" rx="10" fill="url(#grad-input)" stroke="#6366F1" stroke-width="2" />
    <text class="box-title" x="15" y="30">Core CR</text>
    <text class="box-desc" x="15" y="48">kalypso.lmoet.io/v1alpha2</text>
    <rect x="15" y="58" width="160" height="1" fill="#818CF8" opacity="0.3" />
    <text class="resource-text" x="15" y="74">kind: Core</text>
    <text class="resource-text" x="15" y="88">workloadType: string</text>
  </g>

  <!-- 2. INTERNAL RESOLUTION LAYER: PodSpec RGD (Chained) -->
  <g filter="url(#shadow)" transform="translate(300, 80)">
    <rect width="240" height="310" rx="12" fill="url(#grad-internal)" stroke="#475569" stroke-width="2" />
    <text class="box-title" x="15" y="25">PodSpec RGD (Chained)</text>
    <text class="box-desc" x="15" y="42">Internal resource mapping</text>
    
    <!-- SA -->
    <g class="node-card" transform="translate(15, 60)">
      <rect width="210" height="48" rx="6" fill="url(#grad-subresource)" stroke="#64748B" stroke-width="1" />
      <text class="label" x="10" y="20" font-size="11">ServiceAccount</text>
      <text class="cond-text" x="10" y="38">includeWhen: serviceAccount.create</text>
    </g>

    <!-- ConfigMap -->
    <g class="node-card" transform="translate(15, 120)">
      <rect width="210" height="48" rx="6" fill="url(#grad-subresource)" stroke="#64748B" stroke-width="1" />
      <text class="label" x="10" y="20" font-size="11">ConfigMap</text>
      <text class="cond-text" x="10" y="38">includeWhen: configMap.enabled</text>
    </g>

    <!-- Secret -->
    <g class="node-card" transform="translate(15, 180)">
      <rect width="210" height="48" rx="6" fill="url(#grad-subresource)" stroke="#64748B" stroke-width="1" />
      <text class="label" x="10" y="20" font-size="11">Secret</text>
      <text class="cond-text" x="10" y="38">includeWhen: secret.enabled</text>
    </g>

    <!-- Resolved PodTemplate -->
    <g class="node-card" filter="url(#glow-indigo)" transform="translate(15, 240)">
      <rect width="210" height="55" rx="6" fill="#1E1B4B" stroke="#818CF8" stroke-width="1.5" />
      <text class="label" x="10" y="20" font-size="11" fill="#A5B4FC">PodTemplate (Internal)</text>
      <text class="desc" x="10" y="35" font-size="9">Resolves container specs, probes,</text>
      <text class="desc" x="10" y="47" font-size="9">mounts, environment variables, scheduling</text>
    </g>
  </g>

  <!-- 3. CORE WORKLOAD LAYER: Exclusive Workloads (Shifted Downwards) -->
  <!-- Deployment -->
  <g class="node-card" filter="url(#glow-teal)" transform="translate(580, 160)">
    <rect width="320" height="60" rx="8" fill="url(#grad-workload)" stroke="#0D9488" stroke-width="2" />
    <text class="box-title" x="15" y="25">Deployment</text>
    <text class="box-desc" x="15" y="45">Standard stateless workloads</text>
    <rect x="175" y="10" width="130" height="40" rx="4" fill="#042F2E" />
    <text class="cond-text" x="182" y="26" fill="#2DD4BF">workloadType ==</text>
    <text class="cond-text" x="182" y="38" fill="#2DD4BF">"Deployment"</text>
  </g>

  <!-- StatefulSet -->
  <g class="node-card" transform="translate(580, 240)">
    <rect width="320" height="60" rx="8" fill="url(#grad-workload)" stroke="#0D9488" stroke-width="1.5" />
    <text class="box-title" x="15" y="25">StatefulSet</text>
    <text class="box-desc" x="15" y="45">Stateful workloads with PVCs</text>
    <rect x="175" y="10" width="130" height="40" rx="4" fill="#042F2E" />
    <text class="cond-text" x="182" y="26" fill="#2DD4BF">workloadType ==</text>
    <text class="cond-text" x="182" y="38" fill="#2DD4BF">"StatefulSet"</text>
  </g>

  <!-- DaemonSet -->
  <g class="node-card" transform="translate(580, 320)">
    <rect width="320" height="60" rx="8" fill="url(#grad-workload)" stroke="#0D9488" stroke-width="1.5" />
    <text class="box-title" x="15" y="25">DaemonSet</text>
    <text class="box-desc" x="15" y="45">Per-node system agents</text>
    <rect x="175" y="10" width="130" height="40" rx="4" fill="#042F2E" />
    <text class="cond-text" x="182" y="26" fill="#2DD4BF">workloadType ==</text>
    <text class="cond-text" x="182" y="38" fill="#2DD4BF">"DaemonSet"</text>
  </g>

  <!-- 4. OPERATIONAL ADDONS LAYER (Shifted Downwards) -->
  <!-- HorizontalPodAutoscaler -->
  <g class="node-card" transform="translate(580, 430)">
    <rect width="320" height="50" rx="6" fill="url(#grad-operational)" stroke="#8B5CF6" stroke-width="1" />
    <text class="box-title" x="15" y="22" font-size="12">HorizontalPodAutoscaler (HPA)</text>
    <text class="cond-text" x="15" y="38" fill="#DDD6FE">includeWhen: autoscaling.enabled &amp;&amp; (Deployment || StatefulSet)</text>
  </g>

  <!-- PodDisruptionBudget -->
  <g class="node-card" transform="translate(580, 495)">
    <rect width="320" height="50" rx="6" fill="url(#grad-operational)" stroke="#8B5CF6" stroke-width="1" />
    <text class="box-title" x="15" y="22" font-size="12">PodDisruptionBudget (PDB)</text>
    <text class="cond-text" x="15" y="38" fill="#DDD6FE">includeWhen: pdb.enabled</text>
  </g>

  <!-- NetworkPolicy -->
  <g class="node-card" transform="translate(580, 560)">
    <rect width="320" height="50" rx="6" fill="url(#grad-operational)" stroke="#8B5CF6" stroke-width="1" />
    <text class="box-title" x="15" y="22" font-size="12">NetworkPolicy</text>
    <text class="cond-text" x="15" y="38" fill="#DDD6FE">includeWhen: networkPolicy.enabled</text>
  </g>

  <!-- Namespaced RBAC (Role & RoleBinding) -->
  <g class="node-card" transform="translate(580, 625)">
    <rect width="320" height="50" rx="6" fill="url(#grad-operational)" stroke="#8B5CF6" stroke-width="1" />
    <text class="box-title" x="15" y="22" font-size="12">Role &amp; RoleBinding</text>
    <text class="cond-text" x="15" y="38" fill="#DDD6FE">includeWhen: size(rbac.rules) &gt; 0</text>
  </g>

  <!-- Cluster-wide RBAC (ClusterRole & ClusterRoleBinding) -->
  <g class="node-card" transform="translate(580, 690)">
    <rect width="320" height="50" rx="6" fill="url(#grad-operational)" stroke="#8B5CF6" stroke-width="1" />
    <text class="box-title" x="15" y="22" font-size="12">ClusterRole &amp; ClusterRoleBinding</text>
    <text class="cond-text" x="15" y="38" fill="#DDD6FE">includeWhen: size(rbac.clusterRules) &gt; 0</text>
  </g>

  <!-- Flow details connector info (Moved Downward) -->
  <g transform="translate(40, 790)">
    <text class="subtitle" x="0" y="0">• All resources are namespace-scoped to match the Core CR, except ClusterRole/Binding (prefixed by namespace).</text>
    <text class="subtitle" x="0" y="16">• Deployment, StatefulSet, and DaemonSet share the exact same PodSpec definition resolved by the internal PodSpec RGD.</text>
  </g>
</svg>
