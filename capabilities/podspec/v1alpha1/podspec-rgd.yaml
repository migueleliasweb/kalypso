apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: podspec
spec:
  schema:
    apiVersion: v1alpha1
    kind: PodSpec
    group: kalypso.lmoet.io
    scope: Namespaced

    spec:
      image: string | required=true description="Container image to run"
      port: integer | default=8080 description="Container port the application listens on"

      # --- Container Command & Args & Env
      command: "[]string | default=[]"
      args: "[]string | default=[]"
      env: "[]object | default=[]"

      # --- Resources (requests and limits)
      resources:
        requests:
          cpu: string | default="200m" description="CPU request"
          memory: string | default="128Mi" description="Memory request"
        limits:
          cpu: string | description="CPU limit"
          memory: string | description="Memory limit"

      # --- Probes configuration
      probes:
        liveness:
          enabled: boolean | default=true
          path: string | default="/healthz"
          port: integer | default=8080
          initialDelaySeconds: integer | default=0
          periodSeconds: integer | default=10
          timeoutSeconds: integer | default=1
          successThreshold: integer | default=1
          failureThreshold: integer | default=3
          custom: object
        readiness:
          enabled: boolean | default=true
          path: string | default="/readyz"
          port: integer | default=8080
          initialDelaySeconds: integer | default=0
          periodSeconds: integer | default=10
          timeoutSeconds: integer | default=1
          successThreshold: integer | default=1
          failureThreshold: integer | default=3
          custom: object
        startup:
          enabled: boolean | default=false
          path: string | default="/healthz"
          port: integer | default=8080
          initialDelaySeconds: integer | default=0
          periodSeconds: integer | default=10
          timeoutSeconds: integer | default=1
          successThreshold: integer | default=1
          failureThreshold: integer | default=3
          custom: object

      # --- Restart Policy
      restartPolicy: string | default="Always" enum="Always" description="Restart policy for the container"

      # --- Service Account
      serviceAccount:
        create: boolean | default=true description="Whether to create a dedicated Service Account"
        name: string | default="" description="Optional override name for the Service Account"

      # --- Scheduling & Affinity
      scheduling:
        nodeSelector: "map[string]string"
        affinity: object
        tolerations: "[]object | default=[]"
        topologySpread:
          enabled: boolean | default=true
          maxSkew: integer | default=1
          topologyKey: string | default="kubernetes.io/hostname"
          whenUnsatisfiable: string | default="ScheduleAnyway"
          customConstraints: "[]object | default=[]"

      # --- ConfigMap & Secret Integration
      configMap:
        enabled: boolean | default=false
        data: "map[string]string"
      secret:
        enabled: boolean | default=false
        data: "map[string]string"
      volumes: "[]object | default=[]"
      volumeMounts: "[]object | default=[]"

    status:
      podSpec: ${podTemplate.template.spec}

  resources:
    - id: serviceAccount
      includeWhen:
        - '${schema.spec.serviceAccount.create}'
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: '${schema.spec.serviceAccount.name != "" ? schema.spec.serviceAccount.name : schema.metadata.name}'

    - id: configMap
      includeWhen:
        - '${schema.spec.configMap.enabled}'
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: '${schema.metadata.name}'
        data: '${schema.spec.configMap.data}'

    - id: secret
      includeWhen:
        - '${schema.spec.secret.enabled}'
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: '${schema.metadata.name}'
        stringData: '${schema.spec.secret.data}'

    - id: podTemplate
      template:
        apiVersion: v1
        kind: PodTemplate
        metadata:
          name: '${schema.metadata.name}'
        template:
          spec:
            serviceAccountName: '${schema.spec.serviceAccount.create ? (schema.spec.serviceAccount.name != "" ? schema.spec.serviceAccount.name : schema.metadata.name) : (schema.spec.serviceAccount.name != "" ? schema.spec.serviceAccount.name : "default")}'
            restartPolicy: '${schema.spec.restartPolicy}'
            volumes: '${schema.spec.volumes}'
            containers:
              - name: app
                image: '${schema.spec.image}'
                command: '${schema.spec.command}'
                args: '${schema.spec.args}'
                env: '${schema.spec.env}'
                ports:
                  - name: http
                    containerPort: '${schema.spec.port}'
                volumeMounts: '${schema.spec.volumeMounts}'
                resources: '${(has(schema.spec.resources.limits) && (has(schema.spec.resources.limits.cpu) || has(schema.spec.resources.limits.memory))) ? dyn({"requests": {"cpu": (has(schema.spec.resources.limits.cpu) && !(has(schema.spec.resources.requests) && has(schema.spec.resources.requests.cpu)) ? schema.spec.resources.limits.cpu : schema.spec.resources.requests.cpu), "memory": (has(schema.spec.resources.limits.memory) && !(has(schema.spec.resources.requests) && has(schema.spec.resources.requests.memory)) ? schema.spec.resources.limits.memory : schema.spec.resources.requests.memory)}, "limits": (has(schema.spec.resources.limits.cpu) && has(schema.spec.resources.limits.memory) ? {"cpu": schema.spec.resources.limits.cpu, "memory": schema.spec.resources.limits.memory} : (has(schema.spec.resources.limits.cpu) ? {"cpu": schema.spec.resources.limits.cpu} : {"memory": schema.spec.resources.limits.memory}))}) : dyn({"requests": {"cpu": schema.spec.resources.requests.cpu, "memory": schema.spec.resources.requests.memory}})}'
                envFrom: '${(schema.spec.configMap.enabled ? [dyn({"configMapRef": {"name": schema.metadata.name, "optional": false}})] : []) + (schema.spec.secret.enabled ? [dyn({"secretRef": {"name": schema.metadata.name, "optional": false}})] : [])}'
                livenessProbe: '${schema.spec.probes.liveness.enabled ? (has(schema.spec.probes.liveness.custom) ? schema.spec.probes.liveness.custom : dyn({"httpGet": {"path": schema.spec.probes.liveness.path, "port": schema.spec.probes.liveness.port}, "initialDelaySeconds": schema.spec.probes.liveness.initialDelaySeconds, "periodSeconds": schema.spec.probes.liveness.periodSeconds, "timeoutSeconds": schema.spec.probes.liveness.timeoutSeconds, "successThreshold": schema.spec.probes.liveness.successThreshold, "failureThreshold": schema.spec.probes.liveness.failureThreshold})) : null}'
                readinessProbe: '${schema.spec.probes.readiness.enabled ? (has(schema.spec.probes.readiness.custom) ? schema.spec.probes.readiness.custom : dyn({"httpGet": {"path": schema.spec.probes.readiness.path, "port": schema.spec.probes.readiness.port}, "initialDelaySeconds": schema.spec.probes.readiness.initialDelaySeconds, "periodSeconds": schema.spec.probes.readiness.periodSeconds, "timeoutSeconds": schema.spec.probes.readiness.timeoutSeconds, "successThreshold": schema.spec.probes.readiness.successThreshold, "failureThreshold": schema.spec.probes.readiness.failureThreshold})) : null}'
                startupProbe: '${schema.spec.probes.startup.enabled ? (has(schema.spec.probes.startup.custom) ? schema.spec.probes.startup.custom : dyn({"httpGet": {"path": schema.spec.probes.startup.path, "port": schema.spec.probes.startup.port}, "initialDelaySeconds": schema.spec.probes.startup.initialDelaySeconds, "periodSeconds": schema.spec.probes.startup.periodSeconds, "timeoutSeconds": schema.spec.probes.startup.timeoutSeconds, "successThreshold": schema.spec.probes.startup.successThreshold, "failureThreshold": schema.spec.probes.startup.failureThreshold})) : null}'
            nodeSelector: '${has(schema.spec.scheduling.nodeSelector) ? dyn(schema.spec.scheduling.nodeSelector) : dyn(null)}'
            affinity: '${has(schema.spec.scheduling.affinity) ? dyn(schema.spec.scheduling.affinity) : dyn(null)}'
            tolerations: '${schema.spec.scheduling.tolerations}'
            topologySpreadConstraints: '${schema.spec.scheduling.topologySpread.enabled ? ([dyn({"maxSkew": schema.spec.scheduling.topologySpread.maxSkew, "topologyKey": schema.spec.scheduling.topologySpread.topologyKey, "whenUnsatisfiable": schema.spec.scheduling.topologySpread.whenUnsatisfiable, "labelSelector": {"matchLabels": {"app.kubernetes.io/name": schema.metadata.name}}})] + schema.spec.scheduling.topologySpread.customConstraints) : schema.spec.scheduling.topologySpread.customConstraints}'
